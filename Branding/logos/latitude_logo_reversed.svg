<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <title>Latitude MedTech LLC — Reversed Wordmark (on dark)</title>
  <rect width="400" height="100" fill="#1A1A1A"/>

  <!-- Icon mark: compass circle with latitude bearing line (white/blue) -->
  <g transform="translate(10, 10)">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#5B7FA6" stroke-width="3"/>
    <line x1="4" y1="40" x2="76" y2="40" stroke="#5B7FA6" stroke-width="2.5"/>
    <line x1="40" y1="4"  x2="40" y2="14"  stroke="#5B7FA6" stroke-width="2"/>
    <line x1="40" y1="66" x2="40" y2="76"  stroke="#5B7FA6" stroke-width="2"/>
    <circle cx="40" cy="10" r="3" fill="#5B7FA6"/>
    <circle cx="40" cy="70" r="3" fill="#5B7FA6"/>
    <circle cx="10" cy="40" r="2.5" fill="#8A8680"/>
    <circle cx="70" cy="40" r="2.5" fill="#8A8680"/>
    <circle cx="40" cy="40" r="5" fill="none" stroke="#5B7FA6" stroke-width="2"/>
    <circle cx="40" cy="40" r="2" fill="#5B7FA6"/>
  </g>

  <!-- Wordmark on dark -->
  <g transform="translate(100, 12)">
    <text
      x="0" y="40"
      font-family="'Calibri', 'Gill Sans MT', 'Gill Sans', Arial, sans-serif"
      font-size="36"
      font-weight="700"
      letter-spacing="4"
      fill="#FFFFFF"
    >LATITUDE</text>
    <line x1="0" y1="50" x2="270" y2="50" stroke="#5B7FA6" stroke-width="1.5"/>
    <text
      x="0" y="72"
      font-family="'Calibri', 'Gill Sans MT', 'Gill Sans', Arial, sans-serif"
      font-size="22"
      font-weight="400"
      letter-spacing="7"
      fill="#5B7FA6"
    >MEDTECH</text>
    <text
      x="194" y="58"
      font-family="'Calibri', 'Gill Sans MT', 'Gill Sans', Arial, sans-serif"
      font-size="10"
      font-weight="400"
      letter-spacing="1"
      fill="#8A8680"
    >LLC</text>
  </g>
</svg>
