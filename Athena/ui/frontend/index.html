<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Latitude MedTech — AI-powered MedTech consulting and career coaching, San Diego CA" />
  <title>Latitude MedTech · Athena</title>

  <!-- Inter for UI, Lora for editorial content -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0A2540;
      --ocean: #1A6FA3;
      --gold:  #C4922A;
      --teal:  #1F7A6D;
      --cloud: #F8FAFC;
      --sand:  #F2EDE6;
      --pearl: #FFFFFF;
      --mist:  #DDE4EB;
      --fog:   #7B90A0;
      --slate: #3C5470;
      --ink:   #0A2540;
      --red:   #C0392B;
    }

    html, body {
      background: var(--cloud);
      color: var(--slate);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fog); }

    ::selection { background: rgba(26,111,163,0.18); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
